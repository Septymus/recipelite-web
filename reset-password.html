<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecipeLite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', Helvetica, Arial, sans-serif;
      background-color: #FFF8F5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      max-width: 440px;
      width: 90%;
      text-align: center;
      overflow: hidden;
    }
    .header {
      background-color: #FFF8F5;
      padding: 24px 32px 16px;
      position: relative;
    }
    .header img {
      max-width: 280px;
      height: auto;
    }
    .lang-toggle {
      position: absolute;
      top: 12px;
      right: 16px;
      display: flex;
      gap: 0;
      border-radius: 8px;
      overflow: hidden;
      border: 1.5px solid #E0D6CC;
    }
    .lang-btn {
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      border: none;
      cursor: pointer;
      background: transparent;
      color: #A89688;
      transition: all 0.2s;
    }
    .lang-btn.active {
      background: #FF8C00;
      color: #FFFFFF;
    }
    .body {
      padding: 32px 36px 40px;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px;
    }
    .icon-success { background-color: #E8F5E9; }
    .icon-error { background-color: #FDECEA; }
    .icon-lock { background-color: #FFF3E0; }
    h1 {
      font-size: 22px;
      color: #4E342E;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      color: #5D4037;
      margin-bottom: 8px;
    }
    .footer {
      padding: 16px 36px;
      background-color: #FFF8F5;
      border-top: 1px solid #F0E6DC;
    }
    .footer p {
      font-size: 11px;
      color: #A89688;
      margin: 0;
    }

    /* Form styles */
    .form-group {
      text-align: left;
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #5D4037;
      margin-bottom: 6px;
    }
    .input-wrapper {
      position: relative;
    }
    .form-group input {
      width: 100%;
      padding: 12px 44px 12px 16px;
      border: 1.5px solid #E0D6CC;
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      color: #4E342E;
      background: #FAFAFA;
      transition: border-color 0.2s;
      outline: none;
    }
    .form-group input:focus {
      border-color: #FF8C00;
      background: #FFFFFF;
    }
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: #A89688;
      padding: 4px;
    }
    .toggle-password:hover {
      color: #5D4037;
    }

    /* Strength indicator */
    .strength-bar {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }
    .strength-bar .segment {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background-color: #E0D6CC;
      transition: background-color 0.3s;
    }
    .strength-label {
      font-size: 12px;
      margin-top: 4px;
      text-align: right;
      font-weight: 600;
    }

    /* Validation hints */
    .hints {
      text-align: left;
      margin-bottom: 16px;
    }
    .hint {
      font-size: 12px;
      color: #A89688;
      margin-bottom: 2px;
      transition: color 0.2s;
    }
    .hint.valid {
      color: #2E7D32;
    }

    .error-text {
      font-size: 13px;
      color: #CC3333;
      text-align: left;
      margin-top: 4px;
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn-primary {
      background-color: #FF8C00;
      color: #FFFFFF;
    }
    .btn-primary:hover {
      background-color: #E07B00;
    }
    .btn-primary:disabled {
      background-color: #E0D6CC;
      cursor: not-allowed;
      transform: none;
    }

    /* Spinner */
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #E0D6CC;
      border-top-color: #FF8C00;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* State visibility */
    .state { display: none; }
    .state.active { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="lang-toggle">
        <button class="lang-btn" data-lang="sk" onclick="setLang('sk')">SK</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      </div>
      <img src="https://bqxckmtnlzvftnanumsh.supabase.co/storage/v1/object/public/assets/recipelite_logo_email.png" alt="RecipeLite">
    </div>
    <div class="body">

      <!-- State: Loading -->
      <div id="state-loading" class="state active">
        <div class="spinner"></div>
        <h1 data-i18n="loadingTitle"></h1>
        <p data-i18n="loadingDesc"></p>
      </div>

      <!-- State: Form -->
      <div id="state-form" class="state">
        <div class="icon icon-lock">&#128274;</div>
        <h1 data-i18n="formTitle"></h1>
        <p style="margin-bottom: 24px;" data-i18n="formDesc"></p>

        <form id="reset-form" novalidate>
          <div class="form-group">
            <label for="password" data-i18n="labelPassword"></label>
            <div class="input-wrapper">
              <input type="password" id="password" autocomplete="new-password" data-i18n-placeholder="placeholderPassword">
              <button type="button" class="toggle-password" onclick="togglePassword('password', this)">&#128065;</button>
            </div>
            <div class="strength-bar">
              <div class="segment" id="seg1"></div>
              <div class="segment" id="seg2"></div>
              <div class="segment" id="seg3"></div>
            </div>
            <div class="strength-label" id="strength-label"></div>
          </div>

          <div class="hints">
            <div class="hint" id="hint-length" data-i18n-hint="hintLength"></div>
            <div class="hint" id="hint-upper" data-i18n-hint="hintUpper"></div>
            <div class="hint" id="hint-number" data-i18n-hint="hintNumber"></div>
          </div>

          <div class="form-group">
            <label for="password-confirm" data-i18n="labelConfirm"></label>
            <div class="input-wrapper">
              <input type="password" id="password-confirm" autocomplete="new-password" data-i18n-placeholder="placeholderConfirm">
              <button type="button" class="toggle-password" onclick="togglePassword('password-confirm', this)">&#128065;</button>
            </div>
            <div class="error-text" id="match-error" style="display:none;"></div>
          </div>

          <div class="error-text" id="form-error" style="display:none;text-align:center;margin-bottom:12px;"></div>

          <button type="submit" class="btn btn-primary" id="submit-btn" disabled data-i18n="btnSubmit"></button>
        </form>
      </div>

      <!-- State: Success -->
      <div id="state-success" class="state">
        <div class="icon icon-success">&#10003;</div>
        <h1 data-i18n="successTitle"></h1>
        <p data-i18n="successDesc"></p>
      </div>

      <!-- State: Error -->
      <div id="state-error" class="state">
        <div class="icon icon-error">&#10007;</div>
        <h1 data-i18n="errorTitle"></h1>
        <p data-i18n="errorDesc"></p>
      </div>

    </div>
    <div class="footer">
      <p>RecipeLite &copy; 2025</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://bqxckmtnlzvftnanumsh.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxeGNrbXRubHp2ZnRuYW51bXNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NzkzNzIsImV4cCI6MjA4OTA1NTM3Mn0.vf1GTq3J6_GVoCDg4-fpYSuXWcmCqpobRzIxhKfEvgU';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        detectSessionInUrl: false,
        flowType: 'pkce'
      }
    });

    // --- i18n ---
    const translations = {
      sk: {
        pageTitle: 'RecipeLite — Obnovenie hesla',
        loadingTitle: 'Overujeme odkaz...',
        loadingDesc: 'Počkajte prosím.',
        formTitle: 'Nové heslo',
        formDesc: 'Zadajte nové heslo pre váš účet.',
        labelPassword: 'Nové heslo',
        placeholderPassword: 'Min. 8 znakov',
        labelConfirm: 'Potvrďte heslo',
        placeholderConfirm: 'Zopakujte heslo',
        hintLength: 'Minimálne 8 znakov',
        hintUpper: 'Aspoň jedno veľké písmeno',
        hintNumber: 'Aspoň jedna číslica',
        matchError: 'Heslá sa nezhodujú.',
        btnSubmit: 'Zmeniť heslo',
        btnSaving: 'Ukladám...',
        strengthWeak: 'Slabé',
        strengthMedium: 'Stredné',
        strengthStrong: 'Silné',
        successTitle: 'Heslo bolo zmenené!',
        successDesc: 'Teraz sa môžete prihlásiť v aplikácii RecipeLite s novým heslom.',
        errorTitle: 'Odkaz je neplatný',
        errorDesc: 'Tento odkaz na obnovenie hesla vypršal alebo už bol použitý. Vyžiadajte si nový v aplikácii.',
        formErrorGeneric: 'Nepodarilo sa zmeniť heslo. Skúste to znova.',
        formErrorNetwork: 'Nastala chyba. Skúste to znova.'
      },
      en: {
        pageTitle: 'RecipeLite — Reset password',
        loadingTitle: 'Verifying link...',
        loadingDesc: 'Please wait.',
        formTitle: 'New password',
        formDesc: 'Enter a new password for your account.',
        labelPassword: 'New password',
        placeholderPassword: 'Min. 8 characters',
        labelConfirm: 'Confirm password',
        placeholderConfirm: 'Repeat password',
        hintLength: 'At least 8 characters',
        hintUpper: 'At least one uppercase letter',
        hintNumber: 'At least one digit',
        matchError: 'Passwords do not match.',
        btnSubmit: 'Change password',
        btnSaving: 'Saving...',
        strengthWeak: 'Weak',
        strengthMedium: 'Medium',
        strengthStrong: 'Strong',
        successTitle: 'Password changed!',
        successDesc: 'You can now sign in to the RecipeLite app with your new password.',
        errorTitle: 'Link is invalid',
        errorDesc: 'This password reset link has expired or was already used. Request a new one in the app.',
        formErrorGeneric: 'Failed to change password. Please try again.',
        formErrorNetwork: 'An error occurred. Please try again.'
      }
    };

    let currentLang = 'sk';

    function setLang(lang) {
      currentLang = lang;
      const t = translations[lang];
      document.documentElement.lang = lang;
      document.title = t.pageTitle;

      // Text content
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) el.textContent = t[key];
      });

      // Placeholders
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (t[key]) el.placeholder = t[key];
      });

      // Hints (with bullet prefix)
      document.querySelectorAll('[data-i18n-hint]').forEach(el => {
        const key = el.getAttribute('data-i18n-hint');
        if (t[key]) el.textContent = '\u2022 ' + t[key];
      });

      // Match error
      document.getElementById('match-error').textContent = t.matchError;

      // Strength label (if visible)
      updateValidation();

      // Toggle buttons
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
      });

      localStorage.setItem('recipelite-lang', lang);
    }

    function t(key) {
      return translations[currentLang][key] || key;
    }

    // --- Password logic ---
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('password-confirm');
    const submitBtn = document.getElementById('submit-btn');

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = '&#128064;';
      } else {
        input.type = 'password';
        btn.innerHTML = '&#128065;';
      }
    }

    function validatePassword(pw) {
      return {
        length: pw.length >= 8,
        upper: /[A-Z]/.test(pw),
        number: /[0-9]/.test(pw)
      };
    }

    function getStrength(checks) {
      const passed = Object.values(checks).filter(Boolean).length;
      if (passed === 3) return { level: 3, key: 'strengthStrong', color: '#2E7D32' };
      if (passed === 2) return { level: 2, key: 'strengthMedium', color: '#E6A817' };
      return { level: 1, key: 'strengthWeak', color: '#CC3333' };
    }

    function updateValidation() {
      const pw = passwordInput.value;
      const checks = validatePassword(pw);

      document.getElementById('hint-length').className = 'hint' + (checks.length ? ' valid' : '');
      document.getElementById('hint-upper').className = 'hint' + (checks.upper ? ' valid' : '');
      document.getElementById('hint-number').className = 'hint' + (checks.number ? ' valid' : '');

      const strength = getStrength(checks);
      for (let i = 1; i <= 3; i++) {
        document.getElementById('seg' + i).style.backgroundColor =
          i <= strength.level ? strength.color : '#E0D6CC';
      }
      const label = document.getElementById('strength-label');
      label.textContent = pw.length > 0 ? t(strength.key) : '';
      label.style.color = strength.color;

      const confirm = confirmInput.value;
      const matchError = document.getElementById('match-error');
      matchError.style.display = (confirm.length > 0 && pw !== confirm) ? 'block' : 'none';

      const allValid = checks.length && checks.upper && checks.number && pw === confirm && confirm.length > 0;
      submitBtn.disabled = !allValid;
    }

    passwordInput.addEventListener('input', updateValidation);
    confirmInput.addEventListener('input', updateValidation);

    // --- State management ---
    function showState(stateId) {
      document.querySelectorAll('.state').forEach(el => el.classList.remove('active'));
      document.getElementById(stateId).classList.add('active');
    }

    // --- Init: verify token ---
    async function init() {
      const params = new URLSearchParams(window.location.search);
      const tokenHash = params.get('token_hash');
      const type = params.get('type');

      if (!tokenHash || type !== 'recovery') {
        showState('state-error');
        return;
      }

      try {
        console.log('Verifying token:', tokenHash.substring(0, 10) + '...');
        const { data, error } = await supabase.auth.verifyOtp({
          token_hash: tokenHash,
          type: 'recovery'
        });

        if (error) {
          console.error('verifyOtp error:', error.message);
          showState('state-error');
          return;
        }

        console.log('verifyOtp success, session:', !!data?.session);
        showState('state-form');
      } catch (e) {
        console.error('verifyOtp exception:', e);
        showState('state-error');
      }
    }

    // --- Form submit ---
    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formError = document.getElementById('form-error');
      formError.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = t('btnSaving');

      try {
        const { error } = await supabase.auth.updateUser({
          password: passwordInput.value
        });

        if (error) {
          formError.textContent = t('formErrorGeneric');
          formError.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = t('btnSubmit');
          return;
        }

        showState('state-success');
      } catch (e) {
        formError.textContent = t('formErrorNetwork');
        formError.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = t('btnSubmit');
      }
    });

    // --- Boot ---
    const savedLang = localStorage.getItem('recipelite-lang');
    const browserLang = navigator.language.startsWith('sk') ? 'sk' : 'en';
    setLang(savedLang || browserLang);
    init();
  </script>
</body>
</html>
